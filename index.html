<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>材料台账查询</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f2f4f8; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; margin: -20px -20px 20px -20px; padding: 24px; border-radius: 16px 16px 0 0; }
        .loading, .error { text-align: center; padding: 40px; color: #666; }
        .error { color: #b91c1c; background: #fef2f2; border-radius: 12px; }
        .info-card { background: #f8fafc; border-radius: 16px; padding: 16px; }
        .info-row { display: flex; border-bottom: 1px solid #e2e8f0; padding: 12px; }
        .info-label { font-weight: 600; width: 100px; }
        .info-value { color: #0f172a; }
        .footer { text-align: center; font-size: 12px; color: #64748b; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>📋 材料台账</h1><p>实时同步 · 扫码即查</p></div>
    <div id="mainContent"><div class="loading">⏳ 正在同步数据 <span id="dot">.</span></div></div>
    <div class="footer">🔄 数据来自金山文档 · 实时同步</div>
</div>

<script>
    // ==================== 配置区域 ====================
    // 你需要在AirScript中生成的 Script Token（必填）
    const WPS_TOKEN = 'Jb6hsXJPe7SOjFoOikSq4';
    // ==================== 配置区结束 ====================

    // 获取网址中的 id 参数，用于数据筛选
    function getUrlParameter(name) {
        name = name.replace(/[\[\]]/g, '\\$&');
        const regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)');
        const results = regex.exec(window.location.href);
        if (!results) return null;
        if (!results[2]) return '';
        return decodeURIComponent(results[2].replace(/\+/g, ' '));
    }
    
    // ==================== 核心调用封装 ====================
    async function fetchDataFromWPS() {
        const webhookUrl = 'https://www.kdocs.cn/api/v3/ide/file/caI9ElHU2cbu/script/V2-4vMHz8DthJqVhkre6qrNWO/sync_task';

        // 令牌有效性检查：必须是纯ASCII，且不能是占位符
        if (!WPS_TOKEN || WPS_TOKEN === '你的脚本令牌' || /[^\x00-\x7F]/.test(WPS_TOKEN)) {
            throw new Error('WPS_TOKEN 未正确配置，请替换为你在AirScript中生成的真实令牌（只能包含英文字母、数字和符号）');
        }

        const response = await fetch(webhookUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'AirScript-Token': WPS_TOKEN
            },
            body: JSON.stringify({})
        });

        if (!response.ok) {
            throw new Error(`请求失败 (状态码: ${response.status})，请检查令牌或网络连接`);
        }
        const data = await response.json();
        console.log('金山文档返回数据:', data); // 方便调试，查看实际数据结构
        return data;
    }
    
    // 根据 ID 筛选目标行的数据
    function findRecordById(rows, targetId) {
        if (!rows || rows.length === 0) return null;
        const targetStr = String(targetId);
        return rows.find(row => String(row.ID) === targetStr) || null;
    }

    // 显示加载动画
    let animation;
    function startLoading() {
        let count = 0;
        const dotSpan = document.getElementById('dot');
        if (!dotSpan) return;
        animation = setInterval(() => {
            count = (count + 1) % 4;
            dotSpan.innerText = '.'.repeat(count);
        }, 500);
    }
    function stopLoading() {
        if (animation) clearInterval(animation);
        const dotSpan = document.getElementById('dot');
        if (dotSpan) dotSpan.innerText = '.';
    }
    
    // 渲染数据到页面
    function renderData(record) {
        const container = document.getElementById('mainContent');
        if (!record) {
            container.innerHTML = `<div class="error">❌ 未找到匹配记录<br>请确认二维码中的ID正确，且数据表中存在该编号。</div>`;
            return;
        }
        let rowsHtml = '';
        for (const [key, value] of Object.entries(record)) {
            if (value === undefined || value === null) continue;
            rowsHtml += `<div class="info-row"><div class="info-label">${escapeHtml(key)}</div><div class="info-value">${escapeHtml(String(value))}</div></div>`;
        }
        container.innerHTML = `<div class="info-card">${rowsHtml || '<div class="info-row">暂无详细数据</div>'}</div>
            <div style="text-align:center; margin-top:12px; color:#2a5298;">✨ 数据来源于金山文档，实时同步</div>`;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== 主流程 ====================
    (async function init() {
        startLoading();
        const container = document.getElementById('mainContent');
        const queryId = getUrlParameter('id');
        
        if (!queryId) {
            container.innerHTML = `<div class="error">❌ 无效的访问链接：缺少查询ID（?id=xxx）</div>`;
            stopLoading();
            return;
        }
        
        try {
            const result = await fetchDataFromWPS();
            // 数据解析核心：兼容多种可能的返回格式
            let allRecords = [];
            if (result && result.code === 0) {
                if (result.data && result.data.records) {
                    allRecords = result.data.records;
                } else if (Array.isArray(result.data)) {
                    allRecords = result.data;
                } else if (Array.isArray(result)) {
                    allRecords = result;
                } else {
                    // 如果 result.data 本身就是一行数据，则包装成数组
                    allRecords = result.data ? [result.data] : [];
                }
            } else if (Array.isArray(result)) {
                // 直接返回数组的情况
                allRecords = result;
            } else if (result && result.data && Array.isArray(result.data)) {
                allRecords = result.data;
            }
            
            if (allRecords.length === 0) {
                container.innerHTML = `<div class="error">📭 未能从数据源获取到任何记录<br>请检查令牌、AirScript 脚本及数据表内容。</div>`;
                stopLoading();
                return;
            }
            
            const matchedRecord = findRecordById(allRecords, queryId);
            renderData(matchedRecord);
        } catch (err) {
            console.error(err);
            container.innerHTML = `<div class="error">⚠️ 查询失败: ${escapeHtml(err.message)}<br><br>请确认网络连接，或查看控制台详细报错。</div>`;
        } finally {
            stopLoading();
        }
    })();
</script>
</body>
</html>
